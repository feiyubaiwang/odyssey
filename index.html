<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25岁人生锦囊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #AC5F99;
            --theme-light: rgba(172, 95, 153, 0.08);
            --bg-main: #F7F5F7;
            --bg-card: #FFFFFF;
            --text-main: #2C2C2E;
            --text-sub: #666668;
            --text-muted: #99999B;
            --border-color: #E5E5EA;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .serif-text {
            font-family: 'Noto Serif SC', serif;
        }

        .theme-text {
            color: var(--theme-primary);
        }

        .btn-primary {
            background: var(--theme-primary);
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(172, 95, 153, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(172, 95, 153, 0.35);
        }

        .option-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .option-card:hover {
            border-color: var(--theme-primary);
            background: var(--theme-light);
            transform: translateX(4px);
            cursor: pointer;
            color: var(--theme-primary);
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar-fill {
            background: var(--theme-primary);
            transition: width 0.4s ease;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 60vh;
            background: radial-gradient(ellipse at top, rgba(172,95,153,0.08) 0%, rgba(247,245,247,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .content-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 24px rgba(0,0,0,0.03);
            border-radius: 12px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="bg-glow"></div>

    <main id="home-page" class="flex-1 flex flex-col items-center justify-center p-6 fade-enter max-w-2xl mx-auto w-full text-center">
        <p class="text-xs tracking-[0.2em] text-[var(--text-muted)] mb-4 uppercase">四分之一人生危机</p>
        <h1 class="text-4xl md:text-5xl font-semibold mb-6 leading-tight text-[var(--text-main)]">
            给你的25岁<br>
            <span class="theme-text font-medium">人生锦囊</span>
        </h1>
        <p class="text-[var(--text-sub)] mb-10 text-sm md:text-base leading-relaxed max-w-md">
            回答20个问题，我会根据你目前的状态给到你一些建议和启发，并且为你匹配一个最像你的电影人物。
        </p>
        <button onclick="startQuiz()" class="btn-primary px-10 py-3.5 rounded-full text-sm font-medium tracking-wide">
            开始测试
        </button>
    </main>

    <main id="quiz-page" class="hidden flex-1 flex flex-col items-center justify-center p-6 w-full max-w-2xl mx-auto">
        <div class="w-full mb-10">
            <div class="flex justify-between text-xs text-[var(--text-muted)] mb-3 font-medium tracking-widest uppercase">
                <span>问题</span>
                <span id="progress-text">1 / 20</span>
            </div>
            <div class="w-full h-1 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full progress-bar-fill rounded-full" style="width: 5%;"></div>
            </div>
        </div>

        <div id="question-container" class="w-full">
            <h2 id="question-text" class="text-xl md:text-2xl font-medium leading-relaxed mb-8 text-[var(--text-main)]"></h2>
            <div id="options-container" class="flex flex-col gap-3.5"></div>
        </div>
    </main>

    <main id="loading-page" class="hidden flex-1 flex flex-col items-center justify-center p-6 text-center">
        <div class="animate-pulse flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-[var(--border-color)] border-t-[#AC5F99] rounded-full animate-spin mb-6"></div>
            <p class="font-medium text-[var(--text-main)] mb-2">正在深度分析……</p>
            <p class="text-sm text-[var(--text-muted)]">在平行宇宙里翻找那个跟你最像的人</p>
        </div>
    </main>

    <main id="result-page" class="hidden flex-1 flex-col items-center py-12 px-6 w-full max-w-3xl mx-auto">
        <div class="text-center mb-10 fade-enter" style="animation-delay: 0.1s;">
            <p class="text-xs tracking-[0.2em] text-[var(--text-muted)] mb-3 uppercase">匹配结果</p>
            <h1 id="character-name" class="text-3xl md:text-4xl font-bold serif-text theme-text mb-2"></h1>
            <p id="movie-name" class="text-sm text-[var(--text-sub)]"></p>
        </div>

        <div class="w-full max-w-[320px] aspect-square mb-10 fade-enter relative mx-auto" style="animation-delay: 0.2s;">
            <canvas id="radarChart"></canvas>
        </div>

        <div class="w-full space-y-8">
            <section class="fade-enter" style="animation-delay: 0.4s;">
                <div class="flex items-center mb-4">
                    <div class="w-1.5 h-4 bg-[#AC5F99] mr-2 rounded-full"></div>
                    <h3 class="text-lg font-semibold text-[var(--text-main)]">Ta是怎么熬过来的</h3>
                </div>
                <div class="content-box p-6 md:p-8">
                    <p id="character-story" class="text-[0.95rem] leading-loose text-[var(--text-sub)] text-justify"></p>
                </div>
            </section>

            <section class="fade-enter" style="animation-delay: 0.5s;">
                <div class="flex items-center mb-4">
                    <div class="w-1.5 h-4 bg-[#AC5F99] mr-2 rounded-full"></div>
                    <h3 class="text-lg font-semibold text-[var(--text-main)]">写给25岁的一点心里话</h3>
                </div>
                <div class="content-box p-6 md:p-8 border-l-4 border-l-[#AC5F99]">
                    <p id="life-advice" class="text-[0.95rem] leading-loose text-[var(--text-main)] text-justify space-y-4"></p>
                </div>
            </section>
        </div>

        <div class="mt-12 mb-8 fade-enter text-center" style="animation-delay: 0.6s;">
            <button onclick="location.reload()" class="text-sm text-[var(--text-muted)] hover:text-[#AC5F99] transition-colors underline underline-offset-4">
                重新测试
            </button>
        </div>
    </main>

    <script>
        const questions = [
            {
                q: "1. 朋友聚会上，大家都在聊买房、搞钱和基金，你通常在想什么？",
                options: [
                    { text: "“太俗了，真无聊”，人在现场，心已经飘远了", v: [3, -2, 0, 1, 0] },
                    { text: "表面附和，心里暗自对比自己的进度，有点发慌", v: [0, 2, 0, 0, -1] },
                    { text: "觉得大家活得都挺清醒的，自己也得赶紧规划一下了", v: [-1, 3, 0, -1, 1] },
                    { text: "默默吃菜，听别人吹牛，懒得发表意见", v: [0, 0, 0, -1, 2] }
                ]
            },
            {
                q: "2. 如果明天可以裸辞且一年内卡里都有钱花，你第一件事去干嘛？",
                options: [
                    { text: "立刻买张单程机票出去玩，走到哪算哪", v: [1, -2, 0, 3, 0] },
                    { text: "去学个一直想学但没空搞的爱好，或者搞点创作", v: [3, -1, 1, 1, 0] },
                    { text: "趁机研究点小生意或者做个账号，看能不能自己当老板", v: [0, 3, 0, 1, 1] },
                    { text: "在家躺个昏天黑地，把透支的觉都补回来再说", v: [0, 0, 1, -2, -1] }
                ]
            },
            {
                q: "3. 遇到一个条件很合适、对你也挺好，但就是没啥心动感觉的人，你怎么选？",
                options: [
                    { text: "直接拒绝，没有感觉的恋爱谈了简直是受罪", v: [2, -1, 2, 1, 0] },
                    { text: "试着处处看，感情是可以培养的，合适更重要", v: [-1, 2, -1, 0, 2] },
                    { text: "纠结一阵子，可能处着处着觉得没意思又跑了", v: [1, 0, 1, 2, -2] },
                    { text: "本能地抗拒推进关系，一有人靠近就想躲", v: [0, 0, 3, -1, -2] }
                ]
            },
            {
                q: "4. 收到一份薪水极高，但一眼望去就是天天疯狂加班、当牛做马的工作机会，你去吗？",
                options: [
                    { text: "不去，为了钱把命和生活搭进去，不划算", v: [2, -1, 0, 0, 1] },
                    { text: "咬牙去，先干个两年把钱赚够，把履历刷好看再说", v: [0, 3, 0, -1, 2] },
                    { text: "看这工作本身酷不酷，如果很无聊给再多钱也不干", v: [1, -1, 0, 3, 0] },
                    { text: "很怕自己扛不住那种压力，大概率会找借口拒掉", v: [0, 0, 1, 0, -2] }
                ]
            },
            {
                q: "5. 周末的晚上，你一般怎么度过？",
                options: [
                    { text: "看电影、听播客、或者看点书，沉浸在自己的小世界里", v: [2, 0, 1, 0, 1] },
                    { text: "约人喝酒、去现场音乐演出、或者去认识点新朋友", v: [0, 1, 2, 2, 0] },
                    { text: "加班，或者复盘一下工作，看看搞钱的门道", v: [0, 3, -1, 0, 1] },
                    { text: "疯狂刷短视频/打游戏，脑子一片空白地熬夜", v: [-1, 0, 1, -1, -2] }
                ]
            },
            {
                q: "6. 看到以前觉得不如自己的老同学，现在混得风生水起，你最真实的感受是？",
                options: [
                    { text: "有点酸，同时陷入严重的自我怀疑", v: [0, 1, 1, 0, -2] },
                    { text: "激起胜负欲，分析人家做对了什么，准备弯道超车", v: [0, 3, -1, 1, 2] },
                    { text: "觉得人家赚得再多，日子过得也没我精彩", v: [2, -1, 0, 1, 1] },
                    { text: "关我屁事，默默点个赞划过去", v: [0, 0, 0, -1, 3] }
                ]
            },
            {
                q: "7. 父母又在电话里明里暗里催你回老家考公/找个安稳工作，你的反应是？",
                options: [
                    { text: "大吵一架或者极度烦躁，坚决要在外面折腾", v: [1, -1, 1, 3, 0] },
                    { text: "理智分析利弊，敷衍过去，自己心里早有盘算", v: [0, 2, 0, 0, 3] },
                    { text: "觉得老家那种一眼望到头的生活简直是噩梦", v: [2, -2, 0, 2, 0] },
                    { text: "其实心里也有点动摇，外面确实太累了", v: [0, 1, 1, -2, -1] }
                ]
            },
            {
                q: "8. 不小心在工作/学业上搞砸了一件挺重要的事情，你会？",
                options: [
                    { text: "陷入深深的内耗，觉得大家肯定都在心里骂我", v: [0, 0, 2, 0, -3] },
                    { text: "哪怕心里再慌，表面也要稳住，立刻想补救措施", v: [0, 2, -1, 0, 3] },
                    { text: "大哭一场或者大醉一场，发泄完再说", v: [0, 0, 2, 1, -1] },
                    { text: "大不了辞职/退学算了，此处不留爷自有留爷处", v: [1, -1, 0, 3, -1] }
                ]
            },
            {
                q: "9. 谈恋爱的时候，你最受不了对方哪一点？",
                options: [
                    { text: "没有精神共鸣，聊不到一块去，鸡同鸭讲", v: [3, -1, 1, 0, 0] },
                    { text: "极度黏人，侵占我太多个人空间和精力", v: [0, 1, -2, 2, 1] },
                    { text: "不上进，对未来没有规划，干什么都磨叽", v: [0, 3, -1, 0, 1] },
                    { text: "情绪极其不稳定，天天让我猜对方在想什么", v: [0, 0, 2, -1, 2] }
                ]
            },
            {
                q: "10. 你觉得自己现在最大的“毛病”是什么？",
                options: [
                    { text: "三分钟热度，想法一堆，行动力为零", v: [1, -1, 0, 2, -2] },
                    { text: "太清醒太现实了，很难纯粹地去爱一个人或一件事", v: [-1, 3, -2, 0, 1] },
                    { text: "死要面子活受罪，自尊心强得离谱又极其敏感", v: [0, 0, 3, 0, -1] },
                    { text: "总是活在幻想里，抗拒接受现实的敲打", v: [3, -2, 1, 0, -1] }
                ]
            },
            {
                q: "11. 夜深人静睡不着的时候，脑子里经常在回放什么？",
                options: [
                    { text: "白天某件没做好的事，或者别人的一句无心之言", v: [0, 0, 2, 0, -2] },
                    { text: "那些被现实搁置的梦想，想想还是有些不甘心", v: [3, 0, 1, 0, -1] },
                    { text: "未来几年的职业规划，卡里的存款还差多少", v: [0, 3, -1, 0, 1] },
                    { text: "什么都不想，就是纯粹的失眠，刷手机刷到天亮", v: [-1, 0, 0, -1, -1] }
                ]
            },
            {
                q: "12. 你的好朋友通常会怎么评价你？",
                options: [
                    { text: "靠谱，理智，遇到事情总喜欢找你拿主意", v: [0, 2, -1, 0, 3] },
                    { text: "有点文艺/理想主义，有时候想法很天马行空", v: [3, -1, 1, 1, 0] },
                    { text: "性格挺冲的，说风就是雨，经常干出乎意料的事", v: [1, 0, 0, 3, -1] },
                    { text: "外冷内热，嘴毒心软，其实不太容易让人真正靠近", v: [0, 0, 3, -1, 1] }
                ]
            },
            {
                q: "13. 面对别人的大力夸奖，你的第一反应通常是？",
                options: [
                    { text: "表面说谢谢，心里暗爽，觉得自己确实牛", v: [0, 2, 0, 1, 2] },
                    { text: "非常局促不安，下意识觉得对方是不是在捧杀我", v: [0, 0, 2, 0, -2] },
                    { text: "开心，觉得自己终于被理解、被看到了", v: [2, 0, 3, 0, 0] },
                    { text: "赶紧也夸回去，走个社交过场", v: [0, 1, 0, -1, 1] }
                ]
            },
            {
                q: "14. 如果要挑一部电影反复看，你更倾向于哪种类型？",
                options: [
                    { text: "探讨人性、爱情、或者有点悲剧色彩的文艺片", v: [3, -1, 2, 0, 0] },
                    { text: "主角靠聪明才智一路逆袭、搞钱搞事业的爽文片", v: [0, 3, -1, 1, 1] },
                    { text: "说走就走的公路片，或者充满未知的冒险科幻片", v: [1, -1, 0, 3, 0] },
                    { text: "不用动脑子的轻喜剧，或者温馨治愈系，图个放松", v: [-1, 0, 1, -1, 2] }
                ]
            },
            {
                q: "15. 逛街看到一件价格超预算但真的极其喜欢的衣服，你会？",
                options: [
                    { text: "咬咬牙买了，千金难买心头好，当下爽最重要", v: [2, -2, 1, 1, 0] },
                    { text: "看看吊牌，冷静地放回去，为了件衣服吃土不值得", v: [0, 3, -1, -1, 2] },
                    { text: "纠结半天，最后找了个平替或者等打折", v: [0, 1, 0, 0, -1] },
                    { text: "如果能穿它去见个重要的人/去个重要的场合，就买", v: [1, 1, 2, 0, 0] }
                ]
            },
            {
                q: "16. 想到“30岁”这个逐渐逼近的节点，你的感觉是？",
                options: [
                    { text: "焦虑，觉得该有的世俗成功自己现在一样都没有", v: [0, 2, 0, 0, -2] },
                    { text: "觉得30岁还不算出大招的年纪，人生还长着呢，随便折腾", v: [1, -1, 0, 3, 1] },
                    { text: "有点恐慌，不想长大，觉得自己还是个小孩", v: [2, -2, 1, 0, -1] },
                    { text: "挺期待的，觉得那时候自己应该能活得更从容明白点", v: [0, 1, 0, -1, 3] }
                ]
            },
            {
                q: "17. 遇到特别烦心、扛不住的事情，你第一反应找谁？",
                options: [
                    { text: "找最懂我的朋友倒苦水，大哭一顿求安慰", v: [0, -1, 3, 0, -1] },
                    { text: "谁也不找，自己躲起来消化，不想把脆弱给别人看", v: [0, 1, 2, 0, 1] },
                    { text: "找能帮我解决实际问题的前辈/大佬请教对策", v: [0, 3, -2, 0, 2] },
                    { text: "在社交网络发条伤痛文学，或者干脆出去喝个烂醉", v: [1, 0, 1, 2, -2] }
                ]
            },
            {
                q: "18. 你现在是怎么看待“平庸”这件事的？",
                options: [
                    { text: "绝对不能接受，哪怕粉身碎骨也要活得有点声响", v: [3, 0, 0, 2, 0] },
                    { text: "接受绝大多数人是平庸的，但我不想当大多数", v: [0, 3, 0, 1, 1] },
                    { text: "挺好的啊，只要有饭吃有人爱，平平淡淡才是真", v: [-1, 0, 2, -2, 2] },
                    { text: "我一直在努力，只是为了维持一个看起来普通的体面", v: [0, 1, 1, -1, -1] }
                ]
            },
            {
                q: "19. 如果能回到5年前（差不多刚上大学/刚毕业），你最想对自己说？",
                options: [
                    { text: "“别选那个专业/那份工作，去干你真正想干的事！”", v: [2, -1, 0, 2, 0] },
                    { text: "“搞钱！早点买房/买理财/搞副业！”", v: [0, 3, 0, 0, 0] },
                    { text: "“谈恋爱的时候眼睛擦亮点，别在烂人身上浪费时间！”", v: [0, 0, 3, 0, -1] },
                    { text: "“多去试试不同的事情，别怕犯错，胆子大一点！”", v: [1, 0, 0, 3, 1] }
                ]
            },
            {
                q: "20. 最后，选一句你觉得最像“废话”但你现阶段最信奉的道理：",
                options: [
                    { text: "“人只能活一次，要去做让自己觉得活着的事。”", v: [3, 0, 1, 2, 0] },
                    { text: "“成年人的世界，钱就是最大的底气和自由。”", v: [0, 3, -1, 0, 2] },
                    { text: "“不是所有的鱼都生活在同一片海里。”", v: [1, -1, 0, 3, 0] },
                    { text: "“先别死，日子总会慢慢好起来的。”", v: [0, 0, 2, -1, 3] }
                ]
            }
        ];

        // 替换了角色，调整为25岁左右经历挫折并自我重建的代表人物
        const characters = [
            {
                id: "mia",
                name: "米娅",
                movie: "《爱乐之城》",

        let currentQuestion = 0;
        let userVector = [20, 20, 20, 20, 20]; 
        let radarChartInstance = null;

        function startQuiz() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('progress-text').innerText = `${currentQuestion + 1} / 20`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / 20) * 100}%`;
            
            const qText = document.getElementById('question-text');
            qText.innerText = q.q;
            
            qText.classList.remove('fade-enter');
            void qText.offsetWidth; 
            qText.classList.add('fade-enter');

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = `option-card p-4 rounded-xl text-sm md:text-base leading-relaxed fade-enter`;
                btn.style.animationDelay = `${index * 0.08 + 0.1}s`;
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.v);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(vectorOffset) {
            for(let i = 0; i < 5; i++) {
                userVector[i] += vectorOffset[i] * 3.5;
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                setTimeout(renderQuestion, 200);
            } else {
                showLoading();
            }
        }

        // 优化匹配算法：欧式距离 + 核心特征强化惩罚
        // 这样可以确保用户的最高分项，能更大概率匹配到拥有同样最高分项特征的角色
        function getOptimizedDistance(user, target) {
            let distance = 0;
            let targetMax = Math.max(...target);
            
            for(let i=0; i<5; i++) {
                let diff = user[i] - target[i];
                distance += diff * diff; // 基础距离计算
                
                // 如果这是目标角色的最核心特征，但用户在这一项上偏差较大，则施加额外惩罚权重
                if (target[i] === targetMax && user[i] < target[i] - 10) {
                    distance += Math.pow(Math.abs(diff), 2.5); // 增加惩罚维度
                }
            }
            return Math.sqrt(distance);
        }

        function showLoading() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('loading-page').classList.remove('hidden');
            
            setTimeout(() => {
                calculateResult();
            }, 2500); 
        }

        function clampVector(vec) {
            return vec.map(val => Math.max(15, Math.min(95, val)));
        }

        function calculateResult() {
            let finalVector = clampVector(userVector);
            
            let minDistance = Infinity;
            let matchedCharacter = characters[0];

            for (const char of characters) {
                const dist = getOptimizedDistance(finalVector, char.target);
                if (dist < minDistance) {
                    minDistance = dist;
                    matchedCharacter = char;
                }
            }

            document.getElementById('loading-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('result-page').style.display = 'flex'; 

            document.getElementById('character-name').innerText = matchedCharacter.name;
            document.getElementById('movie-name').innerText = matchedCharacter.movie;
            document.getElementById('character-story').innerHTML = matchedCharacter.story;
            document.getElementById('life-advice').innerHTML = matchedCharacter.advice;

            renderChart(finalVector);
            window.scrollTo(0, 0);
        }

        function renderChart(dataArr) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            Chart.defaults.color = '#666668';
            Chart.defaults.font.family = "'Inter', system-ui, sans-serif";

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['理想主义', '现实搞钱', '情感需求', '渴望折腾', '稳定内核'],
                    datasets: [{
                        label: '你的性格代码',
                        data: dataArr,
                        backgroundColor: 'rgba(172, 95, 153, 0.15)',
                        borderColor: '#AC5F99',
                        pointBackgroundColor: '#AC5F99',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#AC5F99',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(0, 0, 0, 0.06)' },
                            grid: { color: 'rgba(0, 0, 0, 0.06)' },
                            pointLabels: {
                                color: '#2C2C2E',
                                font: { size: 12, weight: '500' }
                            },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#2C2C2E',
                            bodyColor: '#666668',
                            titleFont: { size: 14 },
                            bodyFont: { size: 13 },
                            padding: 12,
                            borderColor: 'rgba(172, 95, 153, 0.3)',
                            borderWidth: 1,
                            boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
                        }
                    }
                }
            });
        }
    </script>
